<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>4학년 2반 학부모 안내문</title>
<style>
  body { font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif; max-width: 600px; margin: 2rem auto; padding: 1.5rem; color: #1c1917; line-height: 1.65; background: #fffbeb; }
  h1 { font-size: 1.4rem; margin: 0 0 0.4rem; color: #92400e; }
  .sub { font-size: 0.85rem; color: #78350f; margin-bottom: 1.4rem; }
  ul { padding-left: 1.2rem; }
  ul li { margin: 0.4rem 0; }
  .reply { background: white; border: 1.5px dashed #d97706; border-radius: 10px; padding: 1rem 1.2rem; margin-top: 1.4rem; font-size: 0.95rem; }
  .reply h3 { margin-top: 0; font-size: 1rem; color: #92400e; }
  .check { display: flex; gap: 1rem; margin: 0.4rem 0; }
  .check label { display: flex; align-items: center; gap: 0.4rem; }
  .signature { margin-top: 1.5rem; font-size: 0.9rem; color: #57534e; }
</style>
</head>
<body>
  <h1>(헤드라인 들어갈 자리)</h1>
  <p class="sub">4학년 2반 · 담임 김 ___</p>
  <p>(학부모 친화 paraphrase 들어갈 자리.)</p>
  <ul>
    <li>(친근한 bullet 1)</li>
    <li>(친근한 bullet 2)</li>
    <li>(친근한 bullet 3)</li>
  </ul>
  <div class="reply">
    <h3>회신 슬립</h3>
    <p>학생 이름: ___________</p>
    <div class="check"><label><input type="checkbox" /> 안내 내용을 확인했습니다.</label></div>
    <div class="check"><label><input type="checkbox" /> 5월 7일 학부모 설명회 참석 (희망 / 불참)</label></div>
    <p>학부모 서명: ___________</p>
  </div>
  <p class="signature">(일정 라인 + 담임 이름은 회신 위에 표시.)</p>
</body>
</html>
