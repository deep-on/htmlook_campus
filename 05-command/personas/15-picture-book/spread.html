<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>달팽이 학교 — 4쪽 spread</title>
<style>
  body { font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif; margin: 0; min-height: 100vh; background: #fef9c3; display: grid; place-items: center; }
  .spread { width: 720px; aspect-ratio: 16/9; background: white; border-radius: 12px; box-shadow: 0 25px 60px rgba(120, 53, 15, 0.15); display: grid; grid-template-columns: 1fr 1fr; padding: 2rem; gap: 2rem; }
  .left { display: flex; flex-direction: column; justify-content: center; gap: 1rem; font-size: 1.3rem; line-height: 1.7; color: #44403c; }
  .left p { margin: 0; }
  .right { display: flex; flex-direction: column; gap: 1rem; }
  .illust { flex: 1; background: linear-gradient(135deg, #fcd34d, #f97316); border-radius: 14px; display: grid; place-items: center; color: white; font-size: 2.5rem; }
  .caption { font-size: 0.95rem; color: #57534e; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
  <div class="spread">
    <div class="left">
      <p>달팽이 학교 아침 종소리,</p>
      <p>등껍질을 매고 길을 떠나는 친구들 모두 모여요.</p>
      <p>책가방은 무거워도, 마음은 가벼워.</p>
    </div>
    <div class="right">
      <div class="illust">🐌</div>
      <p class="caption">오늘은 받침에 대해 배우는 첫 시간이에요.</p>
    </div>
  </div>
</body>
</html>
