<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Flashcards — 신경계</title>
<style>
  body { font-family: 'Apple SD Gothic Neo', -apple-system, sans-serif; margin: 0; min-height: 100vh; background: #0c4a6e; display: grid; place-items: center; }
  .deck { width: 360px; aspect-ratio: 9/16; perspective: 1000px; }
  .card { width: 100%; height: 100%; background: white; border-radius: 22px; padding: 1.8rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; box-shadow: 0 30px 70px rgba(0,0,0,0.4); position: relative; }
  .badge { font-size: 0.7rem; letter-spacing: 0.18em; color: #0284c7; }
  .q { font-size: 1.4rem; font-weight: 700; line-height: 1.3; color: #0f172a; }
  .a { font-size: 1rem; line-height: 1.55; color: #334155; background: #f1f5f9; padding: 0.9rem 1rem; border-radius: 12px; }
  .progress { font-size: 0.78rem; color: #64748b; margin-top: auto; text-align: center; }
</style>
</head>
<body>
  <div class="deck">
    <div class="card">
      <div class="badge">FLASHCARD · 신경계</div>
      <p class="q">(질문 들어갈 자리)</p>
      <div class="a">(답 들어갈 자리)</div>
      <div class="progress">— / 5</div>
    </div>
  </div>
</body>
</html>
