<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Flashcards — 신경계 (synapse 카드 강화)</title>
<style>
  body { font-family: 'Apple SD Gothic Neo', -apple-system, sans-serif; margin: 0; min-height: 100vh; background: #0c4a6e; display: grid; place-items: center; }
  .deck { width: 360px; aspect-ratio: 9/16; }
  .card { width: 100%; height: 100%; background: white; border-radius: 22px; padding: 1.8rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; box-shadow: 0 30px 70px rgba(0,0,0,0.4); }
  .badge { font-size: 0.7rem; letter-spacing: 0.18em; color: #0284c7; }
  .q { font-size: 1.3rem; font-weight: 700; line-height: 1.35; color: #0f172a; }
  .a { font-size: 0.95rem; line-height: 1.55; color: #334155; background: #f1f5f9; padding: 0.9rem 1rem; border-radius: 12px; }
  .progress { font-size: 0.78rem; color: #64748b; margin-top: auto; text-align: center; }
</style>
</head>
<body>
  <div class="deck">
    <div class="card">
      <div class="badge">FLASHCARD · 신경계 · 2/5</div>
      <p class="q">흥분성 시냅스와 억제성 시냅스의 차이를 한 문장으로 설명하시오.</p>
      <div class="a"><strong>흥분성</strong> 시냅스는 신경전달물질이 다음 뉴런의 막을 *탈분극* 시켜 발화 가능성을 높이고, <strong>억제성</strong> 시냅스는 막을 *과분극* 시켜 발화 가능성을 낮춘다. 따라서 같은 입력이라도 시냅스 종류에 따라 출력이 달라진다.</div>
      <div class="progress">2 / 5</div>
    </div>
  </div>
</body>
</html>
