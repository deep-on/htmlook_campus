<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Wonder Lab Kids — 15호 (kid-friendly glossary)</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #fef3c7; min-height: 100vh; display: grid; place-items: center; }
  .page { width: 360px; aspect-ratio: 9/16; background: white; border-radius: 18px; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.9rem; box-shadow: 0 20px 50px rgba(120, 53, 15, 0.15); color: #1c1917; }
  .issue { font-size: 0.7rem; letter-spacing: 0.18em; color: #c2410c; }
  h2 { font-size: 1.4rem; margin: 0; line-height: 1.25; }
  .bubble { background: #fef3c7; border-radius: 14px; padding: 0.75rem 0.95rem; font-size: 0.92rem; line-height: 1.45; }
  .bubble strong { color: #c2410c; }
  ol { padding-left: 1.2rem; margin: 0; font-size: 0.88rem; line-height: 1.5; }
  ol li { margin: 0.3rem 0; }
  .glossary { font-size: 0.78rem; line-height: 1.4; background: #f3f4f6; padding: 0.5rem 0.7rem; border-radius: 10px; margin-top: auto; }
  .chip { display: inline-block; background: #c2410c; color: white; padding: 0.1rem 0.5rem; border-radius: 999px; font-size: 0.7rem; margin-right: 0.25rem; }
</style>
</head>
<body>
  <article class="page">
    <div class="issue">WONDER LAB KIDS · 15호</div>
    <h2>비눗방울은 왜 동그래?</h2>

    <div class="bubble">
      <strong>호기심.</strong> 비눗방울이 동그란 이유는, 같은 양의 공기를 담는 모양 중에서 동그란 모양이 가장 적은 면적으로 공기를 감쌀 수 있기 때문이야!
    </div>

    <ol>
      <li>그릇에 따뜻한 물과 주방세제 한 방울을 섞어.</li>
      <li>빨대로 거품을 한 번 불어 봐.</li>
      <li>방울이 둥글게 변하는 순간을 관찰해.</li>
    </ol>

    <div class="glossary">
      <span class="chip">표면장력</span> 물 표면이 가능한 한 작아지려고 자기 자신을 잡아당기는 힘이야. 그래서 방울이 동그래져.
    </div>
  </article>
</body>
</html>
