<!DOCTYPE html>

<head>

<style>
  body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #fef3c7; min-height: 100vh; display: grid; place-items: center; }
  .page { width: 360px; aspect-ratio: 9/16; background: white; border-radius: 18px; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.9rem; box-shadow: 0 20px 50px rgba(120, 53, 15, 0.15); color: #1c1917; }

  ol { padding-left: 1.2rem; margin: 0; font-size: 0.88rem; line-height: 1.5; }

  .chip { display: inline-block; background: #c2410c; color: white; padding: 0.1rem 0.5rem; border-radius: 999px; font-size: 0.7rem; margin-right: 0.25rem; }
</style>
</head>
<body>

    </div>
  </article>
