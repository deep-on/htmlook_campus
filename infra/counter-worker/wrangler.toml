# Cloudflare Worker · htmlook_campus seed install + like counter
# Deploy: cd infra/counter-worker && npx wrangler deploy
name = "htmlook-campus-counter"
main = "src/index.js"
compatibility_date = "2026-05-08"

# KV namespace for counter storage. Create via:
#   npx wrangler kv:namespace create COUNTERS
# Then paste the id below.
[[kv_namespaces]]
binding = "COUNTERS"
id = "7126f824c62340d88bd57e7ad7d88f77"
preview_id = "4f1894ee11724bf4a9078e2c6e23ab52"

# CORS-safe — htmlook.app + localhost.
[vars]
ALLOWED_ORIGINS = "https://htmlook.app,http://localhost:1420,http://localhost:1421"
