<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Vault Local AI — 15s product launch teaser</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0500;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Pretendard",
          system-ui, sans-serif;
        color: #fff;
      }
      :root {
        --amber: #f59e0b;
        --coral: #fb7185;
        --bg: #0a0500;
        --ink: #ffffff;
        --soft: rgba(255, 224, 178, 0.55);
      }

      .clip {
        position: absolute;
        inset: 0;
        opacity: 0;
        will-change: opacity, transform;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 120px;
        box-sizing: border-box;
        position: relative;
      }

      /* Shared gradient background — amber bias on left, coral on right */
      .bg-gradient {
        position: absolute;
        inset: -10%;
        background: radial-gradient(
            900px circle at 30% 30%,
            rgba(245, 158, 11, 0.55) 0%,
            transparent 55%
          ),
          radial-gradient(
            900px circle at 70% 75%,
            rgba(251, 113, 133, 0.5) 0%,
            transparent 55%
          ),
          var(--bg);
        filter: blur(40px);
      }
      .scene-content > .layer {
        position: relative;
        z-index: 1;
      }

      /* ── Scene 1 — Intro (0-3s) ──────────────────────────────── */
      .intro-tag {
        font-size: 32px;
        letter-spacing: 8px;
        color: var(--soft);
        text-transform: uppercase;
        font-weight: 500;
      }
      .intro-bar {
        margin-top: 24px;
        width: 240px;
        height: 3px;
        background: linear-gradient(90deg, var(--amber), var(--coral));
        border-radius: 2px;
        transform-origin: left center;
      }

      /* ── Scene 2 — "Your AI" (3-8s) ───────────────────────────── */
      .kinetic {
        font-size: 280px;
        font-weight: 800;
        letter-spacing: -10px;
        line-height: 0.95;
        text-align: center;
      }
      .kinetic .word {
        display: inline-block;
        white-space: nowrap;
      }
      .kinetic .l {
        display: inline-block;
        will-change: transform, opacity;
      }
      .kinetic.gradient .l {
        background: linear-gradient(135deg, var(--amber) 0%, var(--coral) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      /* ── Scene 3 — "Your data" + "Your machine" (8-12s) ──────── */
      .stack {
        text-align: center;
      }
      .stack .row {
        font-size: 180px;
        font-weight: 800;
        letter-spacing: -8px;
        line-height: 1;
      }
      .stack .row .l {
        display: inline-block;
        will-change: transform, opacity;
      }
      .stack .row.amber .l {
        background: linear-gradient(135deg, var(--amber) 0%, #fcd34d 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .stack .row.coral .l {
        background: linear-gradient(135deg, var(--coral) 0%, #fda4af 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .stack .row.amber {
        margin-bottom: 20px;
      }

      /* ── Scene 4 — Padlock + URL outro (12-15s) ──────────────── */
      .outro {
        text-align: center;
      }
      .outro .logo-mark {
        display: inline-flex;
        align-items: center;
        gap: 28px;
        font-size: 130px;
        font-weight: 800;
        letter-spacing: -4px;
      }
      .outro .padlock {
        width: 130px;
        height: 130px;
        position: relative;
        display: inline-block;
      }
      .outro .padlock svg {
        width: 100%;
        height: 100%;
      }
      .outro .padlock .shackle {
        transform-origin: 50% 70%;
      }
      .outro .url {
        margin-top: 40px;
        font-size: 38px;
        font-weight: 500;
        color: var(--soft);
        letter-spacing: 4px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1920"
      data-height="1080"
    >
      <!-- Shared gradient bg sits below every scene's content. We
           render it once at root level and let scene-content layers
           overlay it. -->
      <div class="bg-gradient" id="bg-gradient" aria-hidden="true"></div>

      <!-- Scene 1 — intro (0-3s) -->
      <div id="s1" class="clip" data-start="0" data-duration="3" data-track-index="1">
        <div class="scene-content">
          <div class="layer intro">
            <div class="intro-tag">Local · Private · Yours</div>
            <div class="intro-bar"></div>
          </div>
        </div>
      </div>

      <!-- Scene 2 — "Your AI" (3-8s) -->
      <div id="s2" class="clip" data-start="3" data-duration="5" data-track-index="1">
        <div class="scene-content">
          <div class="layer kinetic gradient">
            <div class="word"
              ><span class="l">Y</span><span class="l">o</span><span class="l">u</span><span class="l">r</span></div>
            <div style="height: 16px"></div>
            <div class="word"
              ><span class="l">A</span><span class="l">I</span></div>
          </div>
        </div>
      </div>

      <!-- Scene 3 — "Your data" + "Your machine" (8-12s) -->
      <div id="s3" class="clip" data-start="8" data-duration="4" data-track-index="1">
        <div class="scene-content">
          <div class="layer stack">
            <div class="row amber"
              ><span class="l">Y</span><span class="l">o</span><span class="l">u</span><span class="l">r</span><span class="l">&nbsp;</span><span class="l">d</span><span class="l">a</span><span class="l">t</span><span class="l">a</span></div>
            <div class="row coral"
              ><span class="l">Y</span><span class="l">o</span><span class="l">u</span><span class="l">r</span><span class="l">&nbsp;</span><span class="l">m</span><span class="l">a</span><span class="l">c</span><span class="l">h</span><span class="l">i</span><span class="l">n</span><span class="l">e</span></div>
          </div>
        </div>
      </div>

      <!-- Scene 4 — padlock + URL outro (12-15s) -->
      <div id="s4" class="clip" data-start="12" data-duration="3" data-track-index="1">
        <div class="scene-content">
          <div class="layer outro">
            <div class="logo-mark">
              <span class="padlock" aria-hidden="true">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                  <defs>
                    <linearGradient id="lockGrad" x1="0" y1="0" x2="1" y2="1">
                      <stop offset="0%" stop-color="#f59e0b" />
                      <stop offset="100%" stop-color="#fb7185" />
                    </linearGradient>
                  </defs>
                  <path class="shackle" d="M30 45 V32 a20 20 0 0 1 40 0 V45"
                    fill="none" stroke="url(#lockGrad)" stroke-width="8"
                    stroke-linecap="round" />
                  <rect class="body" x="22" y="44" width="56" height="44"
                    rx="8" fill="url(#lockGrad)" />
                  <circle class="keyhole" cx="50" cy="62" r="5" fill="#0a0500" />
                  <rect x="48" y="62" width="4" height="14" fill="#0a0500" />
                </svg>
              </span>
              <span class="logo-text">Vault&nbsp;Local&nbsp;AI</span>
            </div>
            <div class="url">vaultlocal.ai</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;

      // Background gradient drifts gently for the entire 15 s — gives
      // every scene a subtle living quality.
      tl.fromTo("#bg-gradient", { rotate: -2, scale: 1 }, { rotate: 2, scale: 1.06, duration: 15, ease: "none" }, 0);

      // ── Scene 1 — intro (0-3 s) ──
      tl.fromTo("#s1", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "power2.out" }, 0);
      tl.from("#s1 .intro-tag", { opacity: 0, y: 18, duration: 0.7, ease: "power3.out" }, 0.2);
      tl.from("#s1 .intro-bar", { scaleX: 0, duration: 0.9, ease: "power3.out" }, 0.6);
      tl.to("#s1", { opacity: 0, duration: 0.4, ease: "power2.in" }, 2.6);
      tl.set("#s1", { opacity: 0 }, 3);

      // ── Scene 2 — "Your AI" (3-8 s) ──
      tl.set("#s2", { opacity: 1 }, 3);
      tl.from("#s2 .word:nth-of-type(1) .l", {
        opacity: 0,
        y: 80,
        rotate: 6,
        duration: 0.55,
        ease: "power3.out",
        stagger: 0.045,
      }, 3.05);
      tl.from("#s2 .word:nth-of-type(3) .l", {
        opacity: 0,
        y: 80,
        rotate: -6,
        duration: 0.55,
        ease: "power3.out",
        stagger: 0.06,
      }, 4.05);
      // Subtle scale pulse to hold attention
      tl.to("#s2 .kinetic", { scale: 1.04, duration: 1.6, ease: "sine.inOut" }, 5.4);
      tl.to("#s2", { opacity: 0, duration: 0.5, ease: "power2.in" }, 7.5);
      tl.set("#s2", { opacity: 0 }, 8);

      // ── Scene 3 — "Your data" / "Your machine" (8-12 s) ──
      tl.set("#s3", { opacity: 1 }, 8);
      tl.from("#s3 .row.amber .l", {
        opacity: 0,
        x: -40,
        duration: 0.45,
        ease: "power3.out",
        stagger: 0.035,
      }, 8.1);
      tl.from("#s3 .row.coral .l", {
        opacity: 0,
        x: 40,
        duration: 0.45,
        ease: "power3.out",
        stagger: 0.035,
      }, 9.6);
      tl.to("#s3", { opacity: 0, duration: 0.45, ease: "power2.in" }, 11.55);
      tl.set("#s3", { opacity: 0 }, 12);

      // ── Scene 4 — padlock outro (12-15 s) ──
      tl.set("#s4", { opacity: 1 }, 12);
      // Padlock body fades in, then shackle "locks" closing down.
      tl.from("#s4 .padlock .body", {
        opacity: 0,
        scale: 0.6,
        rotate: -8,
        duration: 0.6,
        ease: "back.out(1.6)",
        transformOrigin: "50% 50%",
      }, 12.1);
      tl.from("#s4 .padlock .shackle", {
        opacity: 0,
        rotate: -25,
        y: -12,
        duration: 0.55,
        ease: "back.out(1.4)",
      }, 12.4);
      tl.from("#s4 .padlock .keyhole", {
        opacity: 0,
        scale: 0,
        duration: 0.35,
        ease: "back.out(2)",
        transformOrigin: "50% 50%",
      }, 12.85);
      tl.from("#s4 .logo-text", { opacity: 0, x: -40, duration: 0.6, ease: "power3.out" }, 12.7);
      tl.from("#s4 .url", { opacity: 0, y: 14, duration: 0.6, ease: "power2.out" }, 13.15);
      tl.to("#s4 .url", { opacity: 0.85, duration: 0.6 }, 14.4);
    </script>
  </body>
</html>
