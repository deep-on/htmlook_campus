<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>달팽이의 학교 — 15s spread teaser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Pen+Script&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #fef3c7;
        color: #3f3f46;
        font-family: "Gaegu", "Nanum Pen Script", -apple-system, system-ui, sans-serif;
      }
      :root {
        --paper: #fef3c7;
        --paper-edge: #f7e9b3;
        --ink: #3f3f46;
        --ink-soft: #6b6b6f;
        --mint: #a7f3d0;
        --mint-deep: #6ee7b7;
        --pink: #fbcfe8;
        --pink-deep: #f9a8d4;
        --rule: #e7e0c4;
        --soft: #d4d4aa;
      }

      .clip {
        position: absolute;
        inset: 0;
        opacity: 0;
        will-change: opacity, transform;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 120px;
        box-sizing: border-box;
        position: relative;
      }

      /* Soft paper grain — static, not animated */
      .paper-bg {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse at 30% 30%, rgba(255, 255, 255, 0.45) 0%, transparent 50%),
          radial-gradient(ellipse at 70% 70%, rgba(231, 224, 196, 0.5) 0%, transparent 55%),
          var(--paper);
      }
      .paper-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          repeating-linear-gradient(
            0deg,
            transparent 0,
            transparent 6px,
            rgba(63, 63, 70, 0.018) 6px,
            rgba(63, 63, 70, 0.018) 7px
          );
        pointer-events: none;
      }

      /* ── Scene 1 — title + byline (0-3s) ─────────────────────── */
      .title-card { text-align: center; }
      .title-card .book-title {
        font-family: "Nanum Pen Script", "Gaegu", cursive;
        font-size: 220px;
        letter-spacing: -2px;
        color: var(--ink);
        line-height: 1;
        font-weight: 400;
      }
      .title-card .byline {
        margin-top: 38px;
        font-family: "Gaegu", sans-serif;
        font-size: 36px;
        letter-spacing: 6px;
        color: var(--ink-soft);
        font-weight: 400;
      }
      .title-card .byline .sep {
        color: var(--mint-deep);
        margin: 0 12px;
      }
      .title-card .underline {
        margin: 32px auto 0;
        width: 280px;
        height: 3px;
        background: linear-gradient(90deg, var(--mint-deep), var(--pink-deep));
        border-radius: 2px;
        transform-origin: left center;
      }

      /* ── Scene 2 — verse stagger, three lines (3-8s) ─────────── */
      .verse {
        text-align: center;
        font-family: "Nanum Pen Script", "Gaegu", cursive;
      }
      .verse .line {
        font-size: 150px;
        color: var(--ink);
        line-height: 1.25;
        letter-spacing: -1px;
        font-weight: 400;
      }
      .verse .line + .line { margin-top: 6px; }
      .verse .line .accent {
        color: var(--pink-deep);
      }
      .verse .syllable-count {
        margin-top: 36px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 22px;
        color: var(--soft);
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      /* ── Scene 3 — watercolor placeholder reveal (8-12s) ─────── */
      .water-stage {
        position: relative;
        width: 1100px;
        height: 720px;
      }
      .water-stage .frame {
        position: absolute;
        inset: 0;
        border: 2px dashed var(--rule);
        border-radius: 24px;
      }
      .water-stage svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .water-stage .caption {
        position: absolute;
        bottom: -64px;
        left: 0;
        right: 0;
        text-align: center;
        font-family: "Gaegu", sans-serif;
        font-size: 42px;
        color: var(--ink-soft);
        letter-spacing: 4px;
      }
      .wash {
        opacity: 0;
        transform-origin: 50% 50%;
      }

      /* ── Scene 4 — page-turn + wordmark (12-15s) ─────────────── */
      .page-turn-stage {
        position: relative;
        width: 1400px;
        height: 700px;
        perspective: 2000px;
      }
      .page-turn-stage .page {
        position: absolute;
        inset: 0;
        background: var(--paper-edge);
        border: 1px solid var(--rule);
        border-radius: 8px;
        box-shadow:
          0 30px 80px rgba(63, 63, 70, 0.15),
          inset 0 0 60px rgba(231, 224, 196, 0.6);
        transform-origin: left center;
        transform-style: preserve-3d;
      }
      .page-turn-stage .page.front {
        background:
          radial-gradient(ellipse at 70% 60%, rgba(167, 243, 208, 0.45) 0%, transparent 55%),
          radial-gradient(ellipse at 30% 50%, rgba(251, 207, 232, 0.4) 0%, transparent 60%),
          var(--paper);
      }
      .wordmark {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        opacity: 0;
      }
      .wordmark .stack { text-align: center; }
      .wordmark .title {
        font-family: "Nanum Pen Script", "Gaegu", cursive;
        font-size: 160px;
        color: var(--ink);
        letter-spacing: -2px;
        line-height: 1;
      }
      .wordmark .sub {
        margin-top: 26px;
        font-family: "Gaegu", sans-serif;
        font-size: 36px;
        color: var(--ink-soft);
        letter-spacing: 8px;
      }
      .wordmark .sub .dot {
        color: var(--mint-deep);
        margin: 0 14px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1920"
      data-height="1080"
    >
      <!-- Paper grain — sits below every scene -->
      <div class="paper-bg" id="paper-bg" aria-hidden="true"></div>

      <!-- Scene 1 — title + byline (0-3s) -->
      <div id="s1" class="clip" data-start="0" data-duration="3" data-track-index="1">
        <div class="scene-content">
          <div class="title-card">
            <div class="book-title">달팽이의 학교</div>
            <div class="byline">
              글 ◯◯◯<span class="sep">·</span>그림 ◯◯◯
            </div>
            <div class="underline"></div>
          </div>
        </div>
      </div>

      <!-- Scene 2 — verse stagger (3-8s) -->
      <div id="s2" class="clip" data-start="3" data-duration="5" data-track-index="1">
        <div class="scene-content">
          <div class="verse">
            <div class="line" data-vline="0">느릿느릿 달팽이</div>
            <div class="line" data-vline="1">학교 가는 길에</div>
            <div class="line" data-vline="2">민들레 <span class="accent">한 송이</span></div>
            <div class="syllable-count">3 lines · ~4 syllables each</div>
          </div>
        </div>
      </div>

      <!-- Scene 3 — watercolor placeholder reveal (8-12s) -->
      <div id="s3" class="clip" data-start="8" data-duration="4" data-track-index="1">
        <div class="scene-content">
          <div class="water-stage">
            <div class="frame"></div>
            <svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg">
              <!-- dandelion stem (mint) -->
              <path id="w-stem"
                d="M 760 580 Q 770 460, 760 340"
                fill="none" stroke="#6ee7b7"
                stroke-width="6" stroke-linecap="round"
                opacity="0" />
              <!-- mint leaf -->
              <ellipse id="w-leaf" class="wash"
                cx="780" cy="500" rx="46" ry="20"
                fill="#a7f3d0" transform="rotate(30 780 500)" />
              <!-- dandelion bloom (pink soft wash) -->
              <circle id="w-bloom-bg" class="wash"
                cx="760" cy="320" r="68" fill="#fbcfe8" />
              <circle id="w-bloom-mid" class="wash"
                cx="760" cy="320" r="44" fill="#f9a8d4" />
              <circle id="w-bloom-core" class="wash"
                cx="760" cy="320" r="20" fill="#fbcfe8" />
              <!-- snail trail (mint dotted, soft) -->
              <path id="w-trail"
                d="M 140 600 C 260 600, 320 580, 440 580"
                fill="none" stroke="#a7f3d0"
                stroke-width="14" stroke-linecap="round"
                stroke-dasharray="6 14"
                opacity="0" />
              <!-- snail shell -->
              <ellipse id="w-shell" class="wash"
                cx="380" cy="560" rx="80" ry="60"
                fill="#fbcfe8" />
              <ellipse id="w-shell-spiral" class="wash"
                cx="380" cy="560" rx="46" ry="34"
                fill="none" stroke="#f9a8d4" stroke-width="4" />
              <ellipse id="w-shell-core" class="wash"
                cx="380" cy="560" rx="18" ry="14"
                fill="none" stroke="#f9a8d4" stroke-width="3" />
              <!-- snail body (mint wash) -->
              <ellipse id="w-body" class="wash"
                cx="450" cy="600" rx="80" ry="22"
                fill="#a7f3d0" />
              <!-- antennae -->
              <line id="w-ant1" class="wash"
                x1="510" y1="588" x2="540" y2="558"
                stroke="#6ee7b7" stroke-width="4" stroke-linecap="round" />
              <line id="w-ant2" class="wash"
                x1="520" y1="592" x2="560" y2="572"
                stroke="#6ee7b7" stroke-width="4" stroke-linecap="round" />
            </svg>
            <div class="caption" id="w-caption">갓 핀 민들레</div>
          </div>
        </div>
      </div>

      <!-- Scene 4 — page-turn + wordmark (12-15s) -->
      <div id="s4" class="clip" data-start="12" data-duration="3" data-track-index="1">
        <div class="scene-content">
          <div class="page-turn-stage">
            <div class="page front" id="page-front"></div>
            <div class="wordmark" id="wordmark">
              <div class="stack">
                <div class="title">달팽이의 학교</div>
                <div class="sub">
                  출간 예정<span class="dot">·</span>2026
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;

      // ── Scene 1 — title (0-3s) ──
      tl.fromTo("#s1", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.out" }, 0);
      tl.from("#s1 .book-title", { opacity: 0, y: 18, duration: 0.9, ease: "power3.out" }, 0.2);
      tl.from("#s1 .byline", { opacity: 0, y: 12, duration: 0.6, ease: "power2.out" }, 0.9);
      tl.from("#s1 .underline", { scaleX: 0, duration: 0.85, ease: "power3.out" }, 1.2);
      tl.to("#s1", { opacity: 0, duration: 0.4, ease: "power2.in" }, 2.55);
      tl.set("#s1", { opacity: 0 }, 3);

      // ── Scene 2 — verse stagger (3-8s) ──
      tl.set("#s2", { opacity: 1 }, 3);
      tl.from("#s2 [data-vline='0']", { opacity: 0, y: 28, duration: 0.55, ease: "power3.out" }, 3.1);
      tl.from("#s2 [data-vline='1']", { opacity: 0, y: 28, duration: 0.55, ease: "power3.out" }, 4.0);
      tl.from("#s2 [data-vline='2']", { opacity: 0, y: 28, duration: 0.55, ease: "power3.out" }, 4.9);
      tl.from("#s2 .syllable-count", { opacity: 0, duration: 0.5, ease: "power2.out" }, 5.7);
      tl.to("#s2 [data-vline='2'] .accent", { scale: 1.05, duration: 1.0, ease: "sine.inOut", transformOrigin: "50% 50%" }, 6.2);
      tl.to("#s2", { opacity: 0, duration: 0.4, ease: "power2.in" }, 7.5);
      tl.set("#s2", { opacity: 0 }, 8);

      // ── Scene 3 — watercolor reveal (8-12s) ──
      tl.set("#s3", { opacity: 1 }, 8);
      tl.from("#s3 .frame", { opacity: 0, scale: 0.97, duration: 0.5, ease: "power2.out", transformOrigin: "50% 50%" }, 8);
      // soft watercolor washes — stagger from snail outward
      tl.fromTo("#w-shell", { opacity: 0, scale: 0.7 }, { opacity: 0.9, scale: 1, duration: 0.7, ease: "power2.out" }, 8.4);
      tl.fromTo("#w-shell-spiral", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 8.9);
      tl.fromTo("#w-shell-core", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 9.1);
      tl.fromTo("#w-body", { opacity: 0, scale: 0.7 }, { opacity: 0.85, scale: 1, duration: 0.6, ease: "power2.out" }, 8.6);
      tl.fromTo("#w-ant1", { opacity: 0 }, { opacity: 0.95, duration: 0.4 }, 9.0);
      tl.fromTo("#w-ant2", { opacity: 0 }, { opacity: 0.95, duration: 0.4 }, 9.1);
      tl.fromTo("#w-trail", { opacity: 0 }, { opacity: 0.6, duration: 0.7, ease: "power2.out" }, 9.2);

      // dandelion blooms in second
      tl.fromTo("#w-stem", { opacity: 0 }, { opacity: 0.85, duration: 0.6, ease: "power2.out" }, 9.6);
      tl.fromTo("#w-leaf", { opacity: 0, scale: 0.6 }, { opacity: 0.85, scale: 1, duration: 0.5, ease: "back.out(1.6)" }, 9.8);
      tl.fromTo("#w-bloom-bg", { opacity: 0, scale: 0.4 }, { opacity: 0.85, scale: 1, duration: 0.7, ease: "power2.out", transformOrigin: "760px 320px" }, 10.0);
      tl.fromTo("#w-bloom-mid", { opacity: 0, scale: 0.4 }, { opacity: 0.95, scale: 1, duration: 0.6, ease: "power2.out", transformOrigin: "760px 320px" }, 10.2);
      tl.fromTo("#w-bloom-core", { opacity: 0, scale: 0.4 }, { opacity: 1, scale: 1, duration: 0.5, ease: "power2.out", transformOrigin: "760px 320px" }, 10.4);

      tl.from("#w-caption", { opacity: 0, y: 12, duration: 0.6, ease: "power2.out" }, 10.6);
      tl.to("#s3", { opacity: 0, duration: 0.4, ease: "power2.in" }, 11.55);
      tl.set("#s3", { opacity: 0 }, 12);

      // ── Scene 4 — page-turn + wordmark (12-15s) ──
      tl.set("#s4", { opacity: 1 }, 12);
      // soft page fold — front page rotates ~25 degrees as if a corner lifts, then settles
      tl.from("#page-front", { opacity: 0, rotateY: -8, duration: 0.6, ease: "power2.out" }, 12.05);
      tl.to("#page-front", { rotateY: -22, duration: 0.7, ease: "power2.inOut" }, 12.6);
      tl.to("#page-front", { rotateY: -14, duration: 0.4, ease: "power2.out" }, 13.4);
      tl.to("#wordmark", { opacity: 1, duration: 0.5, ease: "power2.out" }, 13.0);
      tl.from("#wordmark .title", { opacity: 0, y: 16, duration: 0.6, ease: "power3.out" }, 13.05);
      tl.from("#wordmark .sub", { opacity: 0, duration: 0.5, ease: "power2.out" }, 13.6);
      tl.to("#wordmark .sub", { opacity: 0.9, duration: 0.4 }, 14.4);
    </script>
  </body>
</html>
