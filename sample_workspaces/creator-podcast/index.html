<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Workflow Cast — 15s podcast clip teaser</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #2a1145;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Pretendard",
          system-ui, sans-serif;
        color: #fef3c7;
      }
      :root {
        --bg: #2a1145;
        --purple: #7c3aed;
        --magenta: #e11d48;
        --cream: #fef3c7;
        --soft: rgba(254, 243, 199, 0.55);
      }

      .clip {
        position: absolute;
        inset: 0;
        opacity: 0;
        will-change: opacity, transform;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 120px;
        box-sizing: border-box;
        position: relative;
      }

      /* Shared gradient bg — warm purple breathing into magenta */
      .bg-gradient {
        position: absolute;
        inset: -10%;
        background: radial-gradient(
            900px circle at 28% 32%,
            rgba(124, 58, 237, 0.7) 0%,
            transparent 55%
          ),
          radial-gradient(
            900px circle at 72% 72%,
            rgba(225, 29, 72, 0.55) 0%,
            transparent 55%
          ),
          var(--bg);
        filter: blur(40px);
      }
      .scene-content > .layer {
        position: relative;
        z-index: 1;
      }

      /* ── Scene 1 — Host + episode title (0-3s) ─────────────── */
      .intro {
        text-align: center;
      }
      .intro .host-row {
        display: inline-flex;
        align-items: center;
        gap: 28px;
        margin-bottom: 36px;
      }
      .intro .avatar-mini {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--magenta) 0%, var(--purple) 100%);
        display: grid;
        place-items: center;
        font-size: 38px;
        font-weight: 800;
        color: var(--cream);
        letter-spacing: -1px;
        box-shadow: 0 6px 24px rgba(124, 58, 237, 0.4);
      }
      .intro .host-name {
        font-size: 56px;
        font-weight: 700;
        letter-spacing: -1px;
        color: var(--cream);
      }
      .intro .ep-title {
        font-size: 38px;
        font-weight: 500;
        color: var(--soft);
        letter-spacing: 1px;
      }
      .intro .ep-tag {
        display: inline-block;
        padding: 4px 14px;
        margin-right: 14px;
        background: var(--magenta);
        color: var(--cream);
        border-radius: 6px;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 4px;
        vertical-align: middle;
      }

      /* ── Scene 2 — Kinetic pull quote (3-9s) ───────────────── */
      .quote {
        text-align: center;
        max-width: 1500px;
        line-height: 1.05;
      }
      .quote .line {
        font-size: 120px;
        font-weight: 800;
        letter-spacing: -3px;
        color: var(--cream);
        margin-bottom: 12px;
      }
      .quote .line .w {
        display: inline-block;
        margin: 0 14px;
        will-change: transform, opacity;
      }
      .quote .line .w.accent {
        background: linear-gradient(135deg, var(--magenta) 0%, #fb7185 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .quote .attr {
        margin-top: 28px;
        font-size: 28px;
        color: var(--soft);
        font-weight: 500;
        letter-spacing: 6px;
        text-transform: uppercase;
      }

      /* ── Scene 3 — Host avatar prominent (9-12s) ───────────── */
      .avatar-scene {
        text-align: center;
      }
      .avatar-scene .avatar-big {
        width: 320px;
        height: 320px;
        border-radius: 50%;
        margin: 0 auto 36px;
        background: linear-gradient(135deg, var(--magenta) 0%, var(--purple) 100%);
        display: grid;
        place-items: center;
        font-size: 130px;
        font-weight: 800;
        color: var(--cream);
        letter-spacing: -3px;
        box-shadow: 0 0 0 6px rgba(254, 243, 199, 0.12),
                    0 24px 80px rgba(124, 58, 237, 0.45);
        position: relative;
      }
      .avatar-scene .pulse-ring {
        position: absolute;
        inset: -22px;
        border: 3px solid rgba(254, 243, 199, 0.35);
        border-radius: 50%;
        will-change: transform, opacity;
      }
      .avatar-scene .host-line {
        font-size: 46px;
        font-weight: 700;
        color: var(--cream);
        letter-spacing: -1px;
      }
      .avatar-scene .host-sub {
        margin-top: 10px;
        font-size: 26px;
        color: var(--soft);
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      /* ── Scene 4 — Wordmark outro (12-15s) ─────────────────── */
      .outro {
        text-align: center;
      }
      .outro .handle {
        font-size: 110px;
        font-weight: 800;
        letter-spacing: -3px;
        color: var(--cream);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        margin-bottom: 22px;
      }
      .outro .handle .at {
        background: linear-gradient(135deg, var(--magenta) 0%, var(--purple) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .outro .ep-mark {
        display: inline-flex;
        align-items: center;
        gap: 22px;
        font-size: 38px;
        font-weight: 600;
        color: var(--soft);
        letter-spacing: 4px;
      }
      .outro .ep-mark .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--magenta);
      }
      .outro .show-name {
        margin-top: 40px;
        font-size: 24px;
        color: var(--soft);
        letter-spacing: 8px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1920"
      data-height="1080"
    >
      <!-- Shared gradient bg sits below every scene's content. -->
      <div class="bg-gradient" id="bg-gradient" aria-hidden="true"></div>

      <!-- Scene 1 — Host + episode title (0-3s) -->
      <div id="s1" class="clip" data-start="0" data-duration="3" data-track-index="1">
        <div class="scene-content">
          <div class="layer intro">
            <div class="host-row">
              <span class="avatar-mini">M</span>
              <span class="host-name">Maya Chen</span>
            </div>
            <div class="ep-title">
              <span class="ep-tag">EP 47</span>
              The AI Moat Isn&rsquo;t the Model
            </div>
          </div>
        </div>
      </div>

      <!-- Scene 2 — Kinetic pull quote (3-9s) -->
      <div id="s2" class="clip" data-start="3" data-duration="6" data-track-index="1">
        <div class="scene-content">
          <div class="layer quote">
            <div class="line">
              <span class="w">the</span><span class="w">AI</span><span class="w accent">moat</span>
            </div>
            <div class="line">
              <span class="w">isn&rsquo;t</span><span class="w">the</span><span class="w">model</span>
            </div>
            <div class="line">
              <span class="w">&mdash;</span><span class="w">it&rsquo;s</span><span class="w">the</span><span class="w accent">workflow</span>
            </div>
            <div class="attr">Maya Chen &middot; Workflow Cast</div>
          </div>
        </div>
      </div>

      <!-- Scene 3 — Host avatar prominent (9-12s) -->
      <div id="s3" class="clip" data-start="9" data-duration="3" data-track-index="1">
        <div class="scene-content">
          <div class="layer avatar-scene">
            <div class="avatar-big">
              M
              <span class="pulse-ring" aria-hidden="true"></span>
            </div>
            <div class="host-line">Maya Chen</div>
            <div class="host-sub">Host &middot; Workflow Cast</div>
          </div>
        </div>
      </div>

      <!-- Scene 4 — Wordmark outro (12-15s) -->
      <div id="s4" class="clip" data-start="12" data-duration="3" data-track-index="1">
        <div class="scene-content">
          <div class="layer outro">
            <div class="handle"><span class="at">@</span>workflowcast</div>
            <div class="ep-mark">
              <span>Ep. 47</span>
              <span class="dot" aria-hidden="true"></span>
              <span>The AI Moat Isn&rsquo;t the Model</span>
            </div>
            <div class="show-name">A podcast about shipping</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;

      // Background gradient breathes for the entire 15 s — gives every
      // scene a subtle warm-purple living quality.
      tl.fromTo("#bg-gradient", { rotate: -2, scale: 1 }, { rotate: 2, scale: 1.06, duration: 15, ease: "none" }, 0);

      // ── Scene 1 — host + episode (0-3 s) ──
      tl.fromTo("#s1", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.out" }, 0);
      tl.from("#s1 .avatar-mini", { opacity: 0, scale: 0.6, duration: 0.5, ease: "back.out(1.6)", transformOrigin: "50% 50%" }, 0.1);
      tl.from("#s1 .host-name", { opacity: 0, x: -24, duration: 0.5, ease: "power3.out" }, 0.3);
      tl.from("#s1 .ep-tag", { opacity: 0, scale: 0.7, duration: 0.4, ease: "back.out(1.6)", transformOrigin: "50% 50%" }, 0.7);
      tl.from("#s1 .ep-title", { opacity: 0, y: 14, duration: 0.5, ease: "power3.out" }, 0.85);
      tl.to("#s1", { opacity: 0, duration: 0.4, ease: "power2.in" }, 2.6);
      tl.set("#s1", { opacity: 0 }, 3);

      // ── Scene 2 — kinetic pull quote (3-9 s) ──
      tl.set("#s2", { opacity: 1 }, 3);
      tl.from("#s2 .line:nth-of-type(1) .w", {
        opacity: 0,
        y: 60,
        rotate: 4,
        duration: 0.5,
        ease: "power3.out",
        stagger: 0.11,
      }, 3.1);
      tl.from("#s2 .line:nth-of-type(2) .w", {
        opacity: 0,
        y: 60,
        rotate: -4,
        duration: 0.5,
        ease: "power3.out",
        stagger: 0.11,
      }, 4.4);
      tl.from("#s2 .line:nth-of-type(3) .w", {
        opacity: 0,
        y: 60,
        rotate: 4,
        duration: 0.55,
        ease: "power3.out",
        stagger: 0.13,
      }, 5.7);
      tl.from("#s2 .attr", { opacity: 0, y: 12, duration: 0.5, ease: "power2.out" }, 7.4);
      tl.to("#s2 .quote", { scale: 1.025, duration: 1.2, ease: "sine.inOut" }, 7.6);
      tl.to("#s2", { opacity: 0, duration: 0.5, ease: "power2.in" }, 8.5);
      tl.set("#s2", { opacity: 0 }, 9);

      // ── Scene 3 — host avatar prominent (9-12 s) ──
      tl.set("#s3", { opacity: 1 }, 9);
      tl.from("#s3 .avatar-big", {
        opacity: 0,
        scale: 0.5,
        duration: 0.7,
        ease: "back.out(1.6)",
        transformOrigin: "50% 50%",
      }, 9.1);
      tl.fromTo("#s3 .pulse-ring",
        { opacity: 0.6, scale: 1 },
        { opacity: 0, scale: 1.25, duration: 1.6, ease: "power2.out", repeat: 1 },
        9.4);
      tl.from("#s3 .host-line", { opacity: 0, y: 18, duration: 0.5, ease: "power3.out" }, 9.8);
      tl.from("#s3 .host-sub", { opacity: 0, duration: 0.5, ease: "power2.out" }, 10.1);
      tl.to("#s3", { opacity: 0, duration: 0.5, ease: "power2.in" }, 11.6);
      tl.set("#s3", { opacity: 0 }, 12);

      // ── Scene 4 — wordmark outro (12-15 s) ──
      tl.set("#s4", { opacity: 1 }, 12);
      tl.from("#s4 .handle", {
        opacity: 0,
        y: 22,
        duration: 0.7,
        ease: "power3.out",
      }, 12.1);
      tl.from("#s4 .handle .at", {
        opacity: 0,
        scale: 0.6,
        duration: 0.5,
        ease: "back.out(1.8)",
        transformOrigin: "50% 50%",
      }, 12.3);
      tl.from("#s4 .ep-mark", {
        opacity: 0,
        y: 14,
        duration: 0.6,
        ease: "power2.out",
      }, 12.7);
      tl.from("#s4 .ep-mark .dot", {
        opacity: 0,
        scale: 0,
        duration: 0.4,
        ease: "back.out(2)",
        transformOrigin: "50% 50%",
      }, 12.95);
      tl.from("#s4 .show-name", { opacity: 0, duration: 0.6, ease: "power2.out" }, 13.2);
      tl.to("#s4 .show-name", { opacity: 0.85, duration: 0.6 }, 14.4);
    </script>
  </body>
</html>
