<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Battery Bench 2026 — 15s benchmark teaser</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b1a2e;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Pretendard",
          system-ui, sans-serif;
        color: #fff;
      }
      :root {
        --navy: #0b1a2e;
        --navy-2: #0f2440;
        --lime: #a3e635;
        --amber: #fbbf24;
        --bg: #0b1a2e;
        --ink: #ffffff;
        --soft: rgba(220, 234, 252, 0.55);
        --rule: rgba(220, 234, 252, 0.18);
      }

      .clip {
        position: absolute;
        inset: 0;
        opacity: 0;
        will-change: opacity, transform;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 120px;
        box-sizing: border-box;
        position: relative;
      }

      /* Shared engineering-lab gradient — cool navy only, never warm. */
      .bg-gradient {
        position: absolute;
        inset: -10%;
        background: radial-gradient(
            900px circle at 30% 30%,
            rgba(15, 36, 64, 0.95) 0%,
            transparent 55%
          ),
          radial-gradient(
            900px circle at 70% 75%,
            rgba(163, 230, 53, 0.16) 0%,
            transparent 55%
          ),
          var(--bg);
        filter: blur(40px);
      }
      .scene-content > .layer {
        position: relative;
        z-index: 1;
      }

      /* ── Scene 1 — Intro tag (0-3s) ─────────────────────────── */
      .intro-tag {
        font-size: 32px;
        letter-spacing: 8px;
        color: var(--soft);
        text-transform: uppercase;
        font-weight: 500;
      }
      .intro-bar {
        margin-top: 24px;
        width: 240px;
        height: 3px;
        background: linear-gradient(90deg, var(--lime), var(--amber));
        border-radius: 2px;
        transform-origin: left center;
      }

      /* ── Scene 2 — Kinetic benchmark numbers (3-7s) ─────────── */
      .bench {
        text-align: center;
      }
      .bench .row {
        font-size: 200px;
        font-weight: 800;
        letter-spacing: -8px;
        line-height: 0.95;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
      }
      .bench .row .l {
        display: inline-block;
        will-change: transform, opacity;
      }
      .bench .row.lime .l {
        background: linear-gradient(135deg, var(--lime) 0%, #d9f99d 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .bench .row.amber .l {
        background: linear-gradient(135deg, var(--amber) 0%, #fde68a 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .bench .row.ink .l {
        color: var(--ink);
      }
      .bench .row + .row {
        margin-top: 6px;
      }
      .bench .unit-rule {
        margin: 12px auto 0;
        height: 2px;
        width: 0%;
        background: var(--lime);
        max-width: 920px;
      }

      /* ── Scene 3 — Bar chart + vendor silhouettes (7-11s) ───── */
      .chart-wrap {
        width: 1300px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 80px;
        align-items: end;
      }
      .vendor {
        text-align: center;
      }
      .vendor .silhouette {
        width: 240px;
        height: 240px;
        margin: 0 auto 18px;
        border-radius: 22px;
        background: rgba(220, 234, 252, 0.42);
        position: relative;
        overflow: hidden;
        will-change: transform, opacity;
      }
      .vendor .silhouette .glyph {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-size: 96px;
        font-weight: 800;
        color: var(--navy);
        letter-spacing: -2px;
      }
      .vendor .silhouette::after {
        content: "";
        position: absolute;
        left: 16%;
        right: 16%;
        bottom: 12px;
        height: 1px;
        background: var(--lime);
        opacity: 0;
        transform: scaleX(0);
        transform-origin: left center;
      }
      .vendor.on .silhouette::after {
        opacity: 1;
        transform: scaleX(1);
        transition: transform 0.5s ease, opacity 0.4s ease;
      }
      .vendor .label {
        font-size: 22px;
        letter-spacing: 4px;
        color: var(--soft);
        text-transform: uppercase;
        margin-bottom: 14px;
      }
      .vendor .bar {
        margin: 0 auto;
        width: 64px;
        height: 0;
        background: linear-gradient(180deg, var(--lime), var(--amber));
        border-radius: 6px 6px 0 0;
        will-change: height;
      }
      .vendor .bar-track {
        position: relative;
        height: 280px;
        margin: 0 auto;
        width: 64px;
        background: var(--rule);
        border-radius: 6px;
        overflow: hidden;
      }
      .vendor .bar-fill {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(180deg, var(--lime), var(--amber));
        border-radius: 6px 6px 0 0;
        height: 0%;
        will-change: height;
      }

      /* ── Scene 4 — Wordmark close (11-15s) ──────────────────── */
      .outro {
        text-align: center;
      }
      .outro .mark {
        display: inline-flex;
        align-items: center;
        gap: 28px;
        font-size: 130px;
        font-weight: 800;
        letter-spacing: -4px;
      }
      .outro .glyph-cell {
        width: 130px;
        height: 130px;
        position: relative;
        display: inline-block;
        border-radius: 22px;
        background: var(--navy-2);
        border: 2px solid var(--lime);
        overflow: hidden;
      }
      .outro .glyph-cell::before {
        content: "";
        position: absolute;
        left: 22px;
        right: 22px;
        top: 22px;
        bottom: 22px;
        background: linear-gradient(180deg, var(--lime), var(--amber));
        border-radius: 8px;
      }
      .outro .glyph-cell::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 12px;
        width: 24px;
        height: 14px;
        margin-left: -12px;
        background: var(--lime);
        border-radius: 4px 4px 0 0;
      }
      .outro .url {
        margin-top: 40px;
        font-size: 38px;
        font-weight: 500;
        color: var(--soft);
        letter-spacing: 4px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1920"
      data-height="1080"
    >
      <!-- Shared cool-navy gradient sits below every scene's content. -->
      <div class="bg-gradient" id="bg-gradient" aria-hidden="true"></div>

      <!-- Scene 1 — intro tag (0-3s) -->
      <div id="s1" class="clip" data-start="0" data-duration="3" data-track-index="1">
        <div class="scene-content">
          <div class="layer intro">
            <div class="intro-tag">Battery Bench 2026</div>
            <div class="intro-bar"></div>
          </div>
        </div>
      </div>

      <!-- Scene 2 — kinetic benchmark numbers (3-7s) -->
      <div id="s2" class="clip" data-start="3" data-duration="4" data-track-index="1">
        <div class="scene-content">
          <div class="layer bench">
            <div class="row lime"
              ><span class="l">3</span><span class="l">2</span><span class="l">0</span><span class="l">&nbsp;</span><span class="l">W</span><span class="l">h</span><span class="l">/</span><span class="l">k</span><span class="l">g</span></div>
            <div class="row amber"
              ><span class="l">1</span><span class="l">0</span><span class="l">C</span><span class="l">&nbsp;</span><span class="l">p</span><span class="l">e</span><span class="l">a</span><span class="l">k</span></div>
            <div class="row ink"
              ><span class="l">8</span><span class="l">0</span><span class="l">0</span><span class="l">0</span><span class="l">&nbsp;</span><span class="l">c</span><span class="l">y</span><span class="l">c</span><span class="l">l</span><span class="l">e</span><span class="l">s</span></div>
            <div class="unit-rule" id="s2-rule"></div>
          </div>
        </div>
      </div>

      <!-- Scene 3 — bar chart + vendor silhouettes (7-11s) -->
      <div id="s3" class="clip" data-start="7" data-duration="4" data-track-index="1">
        <div class="scene-content">
          <div class="layer chart-wrap">
            <div class="vendor" id="v1">
              <div class="silhouette"><span class="glyph">A</span></div>
              <div class="label">Vendor A</div>
              <div class="bar-track"><div class="bar-fill" data-h="76"></div></div>
            </div>
            <div class="vendor" id="v2">
              <div class="silhouette"><span class="glyph">B</span></div>
              <div class="label">Vendor B</div>
              <div class="bar-track"><div class="bar-fill" data-h="92"></div></div>
            </div>
            <div class="vendor" id="v3">
              <div class="silhouette"><span class="glyph">C</span></div>
              <div class="label">Vendor C</div>
              <div class="bar-track"><div class="bar-fill" data-h="64"></div></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Scene 4 — wordmark close (11-15s) -->
      <div id="s4" class="clip" data-start="11" data-duration="4" data-track-index="1">
        <div class="scene-content">
          <div class="layer outro">
            <div class="mark">
              <span class="glyph-cell" aria-hidden="true"></span>
              <span class="logo-text">Battery&nbsp;Bench&nbsp;2026</span>
            </div>
            <div class="url">batterybench.io</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;

      // Background gradient drifts gently for the entire 15 s — keeps a
      // subtle living quality on every scene. Cool only, never warm.
      tl.fromTo("#bg-gradient", { rotate: -2, scale: 1 }, { rotate: 2, scale: 1.06, duration: 15, ease: "none" }, 0);

      // ── Scene 1 — intro tag (0-3 s) ──
      tl.fromTo("#s1", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "power2.out" }, 0);
      tl.from("#s1 .intro-tag", { opacity: 0, y: 18, duration: 0.7, ease: "power3.out" }, 0.2);
      tl.from("#s1 .intro-bar", { scaleX: 0, duration: 0.9, ease: "power3.out" }, 0.6);
      tl.to("#s1", { opacity: 0, duration: 0.4, ease: "power2.in" }, 2.6);
      tl.set("#s1", { opacity: 0 }, 3);

      // ── Scene 2 — kinetic benchmark numbers (3-7 s) ──
      tl.set("#s2", { opacity: 1 }, 3);
      tl.from("#s2 .row.lime .l", {
        opacity: 0,
        y: 80,
        rotate: 4,
        duration: 0.5,
        ease: "power3.out",
        stagger: 0.04,
      }, 3.05);
      tl.from("#s2 .row.amber .l", {
        opacity: 0,
        y: 60,
        rotate: -3,
        duration: 0.45,
        ease: "power3.out",
        stagger: 0.04,
      }, 4.0);
      tl.from("#s2 .row.ink .l", {
        opacity: 0,
        y: 50,
        duration: 0.4,
        ease: "power3.out",
        stagger: 0.035,
      }, 4.85);
      tl.fromTo("#s2-rule", { width: "0%" }, { width: "60%", duration: 0.7, ease: "power2.out" }, 5.6);
      tl.to("#s2 .bench", { scale: 1.02, duration: 0.9, ease: "sine.inOut" }, 5.8);
      tl.to("#s2", { opacity: 0, duration: 0.4, ease: "power2.in" }, 6.6);
      tl.set("#s2", { opacity: 0 }, 7);

      // ── Scene 3 — bar chart + vendor silhouettes (7-11 s) ──
      tl.set("#s3", { opacity: 1 }, 7);
      tl.from("#s3 #v1 .silhouette", { opacity: 0, y: 40, duration: 0.5, ease: "power3.out" }, 7.05);
      tl.from("#s3 #v2 .silhouette", { opacity: 0, y: 40, duration: 0.5, ease: "power3.out" }, 7.25);
      tl.from("#s3 #v3 .silhouette", { opacity: 0, y: 40, duration: 0.5, ease: "power3.out" }, 7.45);
      tl.from("#s3 #v1 .label", { opacity: 0, duration: 0.4 }, 7.6);
      tl.from("#s3 #v2 .label", { opacity: 0, duration: 0.4 }, 7.8);
      tl.from("#s3 #v3 .label", { opacity: 0, duration: 0.4 }, 8.0);
      // Bars rise to their target heights (read from data-h) staggered
      // 200 ms apart, lime→amber rule lights below each silhouette.
      tl.fromTo("#s3 #v1 .bar-fill", { height: "0%" }, { height: "76%", duration: 0.9, ease: "power3.out" }, 8.2);
      tl.fromTo("#s3 #v2 .bar-fill", { height: "0%" }, { height: "92%", duration: 0.9, ease: "power3.out" }, 8.4);
      tl.fromTo("#s3 #v3 .bar-fill", { height: "0%" }, { height: "64%", duration: 0.9, ease: "power3.out" }, 8.6);
      // Lime underline rule under each silhouette
      tl.set("#s3 #v1", { className: "vendor on" }, 9.4);
      tl.set("#s3 #v2", { className: "vendor on" }, 9.6);
      tl.set("#s3 #v3", { className: "vendor on" }, 9.8);
      tl.to("#s3", { opacity: 0, duration: 0.45, ease: "power2.in" }, 10.55);
      tl.set("#s3", { opacity: 0 }, 11);

      // ── Scene 4 — wordmark close (11-15 s) ──
      tl.set("#s4", { opacity: 1 }, 11);
      tl.from("#s4 .glyph-cell", {
        opacity: 0,
        scale: 0.6,
        rotate: -8,
        duration: 0.7,
        ease: "back.out(1.6)",
        transformOrigin: "50% 50%",
      }, 11.1);
      tl.from("#s4 .logo-text", { opacity: 0, x: -40, duration: 0.6, ease: "power3.out" }, 11.45);
      tl.from("#s4 .url", { opacity: 0, y: 14, duration: 0.6, ease: "power2.out" }, 11.95);
      tl.to("#s4 .url", { opacity: 0.85, duration: 0.6 }, 13.4);
    </script>
  </body>
</html>
