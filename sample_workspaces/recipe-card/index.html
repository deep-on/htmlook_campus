<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>RecipeCards · 오늘의 떡볶이 — 15s portrait teaser (30 min)</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0; width: 1080px; height: 1920px;
        overflow: hidden; background: #fef3c7;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Pretendard",
          system-ui, sans-serif;
        color: #1e293b;
      }
      :root {
        --bg: #fef3c7; --tomato: #dc2626; --tomato-2: #b91c1c;
        --herb: #10b981; --ink: #1e293b;
        --muted: #64748b; --line: #fde68a; --card: #ffffff;
      }
      .clip {
        position: absolute; inset: 0; opacity: 0;
        will-change: opacity, transform;
      }
      .scene-content {
        width: 100%; height: 100%;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 100px 80px;
      }

      /* Background — soft cross-hatch wash, kitchen-magazine vibe. */
      .bg-wash {
        position: absolute; inset: 0;
        background:
          radial-gradient(circle at 50% 28%, rgba(220, 38, 38, 0.06) 0%, transparent 55%),
          repeating-linear-gradient(
            45deg,
            transparent 0px, transparent 24px,
            rgba(220, 38, 38, 0.04) 24px, rgba(220, 38, 38, 0.04) 25px
          );
      }

      /* Persistent header pill (scenes 1-4) */
      .header-pill {
        position: absolute;
        top: 130px; left: 0; right: 0;
        text-align: center; z-index: 3;
        opacity: 0;
      }
      .header-pill .dish {
        font-size: 84px;
        font-weight: 800;
        letter-spacing: -3px;
        color: var(--ink);
        line-height: 1.05;
      }
      .header-pill .dish .accent { color: var(--tomato); }
      .header-pill .pill {
        display: inline-block;
        background: var(--tomato);
        color: #fff;
        font-family: ui-monospace, monospace;
        font-size: 30px;
        letter-spacing: 6px;
        padding: 12px 32px;
        border-radius: 999px;
        font-weight: 700;
        margin-top: 30px;
        box-shadow: 0 8px 24px rgba(220, 38, 38, 0.25);
      }

      /* Footer wordmark (scenes 2-4) */
      .footer-mark {
        position: absolute;
        bottom: 110px; left: 0; right: 0;
        text-align: center;
        z-index: 3;
        opacity: 0;
      }
      .footer-mark .text {
        font-family: ui-monospace, monospace;
        font-size: 24px;
        color: var(--ink);
        letter-spacing: 4px;
      }
      .footer-mark .text .strong { color: var(--tomato); font-weight: 800; }

      /* ── Scene 1 — Header reveal (0-3.5s) ────────────────────── */
      .scene-1 .stack {
        font-size: 36px;
        color: var(--muted);
        letter-spacing: 6px;
        text-transform: uppercase;
        font-weight: 700;
        text-align: center;
        margin-top: 480px;
      }

      /* ── Scene 2 — Ingredients list (3.5-7s) ────────────────── */
      .ingredients {
        margin: 480px auto 0;
        width: 800px;
        background: var(--card);
        border-radius: 28px;
        border: 2px solid var(--line);
        padding: 48px 56px;
        box-shadow: 0 16px 48px rgba(15, 23, 42, 0.1);
      }
      .ingredients .label {
        font-family: ui-monospace, monospace;
        font-size: 22px;
        letter-spacing: 5px;
        color: var(--tomato);
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 28px;
        text-align: center;
      }
      .ingredients .row {
        display: flex; justify-content: space-between;
        padding: 16px 0;
        border-bottom: 1px dashed var(--line);
        font-size: 38px;
      }
      .ingredients .row:last-child { border-bottom: none; }
      .ingredients .row .qty {
        font-family: ui-monospace, monospace;
        color: var(--tomato);
        font-weight: 800;
      }
      .ingredients .row .name {
        color: var(--ink);
        font-weight: 600;
      }

      /* ── Scene 3 — 4 step icons (7-11s) ─────────────────────── */
      .steps {
        margin: 460px auto 0;
        width: 880px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 28px;
      }
      .steps .step {
        background: var(--card);
        border-radius: 24px;
        border: 2px solid var(--line);
        padding: 36px 30px;
        text-align: center;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
        position: relative;
      }
      .steps .step .num {
        position: absolute;
        top: 18px; left: 24px;
        font-family: ui-monospace, monospace;
        font-size: 24px;
        color: var(--tomato);
        font-weight: 800;
      }
      .steps .step .icon {
        font-size: 96px;
        line-height: 1;
        margin-top: 16px;
        margin-bottom: 16px;
        color: var(--herb);
      }
      .steps .step .label {
        font-size: 36px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -1px;
      }
      .steps .step .time {
        margin-top: 8px;
        font-family: ui-monospace, monospace;
        font-size: 20px;
        color: var(--muted);
        letter-spacing: 2px;
      }

      /* ── Scene 4 — Wordmark outro (11-15s) ──────────────────── */
      .outro {
        text-align: center;
        position: absolute;
        top: 50%; left: 0; right: 0;
        transform: translateY(-50%);
      }
      .outro .mark {
        font-size: 110px;
        font-weight: 800;
        letter-spacing: -3px;
        color: var(--ink);
        margin-bottom: 24px;
      }
      .outro .mark .accent { color: var(--tomato); }
      .outro .meta {
        font-size: 38px;
        color: var(--muted);
        letter-spacing: 4px;
        font-family: ui-monospace, monospace;
        font-weight: 700;
        margin-bottom: 60px;
      }
      .outro .meta .herb { color: var(--herb); }
      .outro .url {
        font-size: 42px;
        color: var(--tomato);
        letter-spacing: 5px;
        font-family: ui-monospace, monospace;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1080"
      data-height="1920"
    >
      <div class="bg-wash" aria-hidden="true"></div>

      <!-- Persistent header (scenes 1-4) -->
      <div id="header-pill" class="header-pill">
        <div class="dish">오늘의 <span class="accent">떡볶이</span></div>
        <div class="pill">⏱ 30 MIN · 1인분</div>
      </div>

      <!-- Persistent footer wordmark (scenes 2-4) -->
      <div id="footer-mark" class="footer-mark">
        <div class="text"><span class="strong">RecipeCards</span> · recipecards.kitchen</div>
      </div>

      <!-- Scene 1 — Header reveal (0-3.5s) -->
      <div id="s1" class="clip scene-1" data-start="0" data-duration="3.5" data-track-index="1">
        <div class="scene-content">
          <div class="stack">RECIPE OF THE DAY</div>
        </div>
      </div>

      <!-- Scene 2 — Ingredients list (3.5-7s) -->
      <div id="s2" class="clip" data-start="3.5" data-duration="3.5" data-track-index="1">
        <div class="ingredients" id="ing">
          <div class="label">재료 · INGREDIENTS</div>
          <div class="row" data-i="1"><span class="qty">200 g</span><span class="name">떡 (sliced)</span></div>
          <div class="row" data-i="2"><span class="qty">100 g</span><span class="name">어묵</span></div>
          <div class="row" data-i="3"><span class="qty">1 Tbsp</span><span class="name">고추장</span></div>
          <div class="row" data-i="4"><span class="qty">1 Tbsp</span><span class="name">설탕</span></div>
          <div class="row" data-i="5"><span class="qty">2 컵</span><span class="name">물 + 멸치 다시</span></div>
        </div>
      </div>

      <!-- Scene 3 — 4 step icons (7-11s) -->
      <div id="s3" class="clip" data-start="7" data-duration="4" data-track-index="1">
        <div class="steps" id="steps">
          <div class="step" data-s="1">
            <div class="num">01</div>
            <div class="icon">🔪</div>
            <div class="label">썰기</div>
            <div class="time">2 MIN</div>
          </div>
          <div class="step" data-s="2">
            <div class="num">02</div>
            <div class="icon">🍲</div>
            <div class="label">끓이기</div>
            <div class="time">10 MIN</div>
          </div>
          <div class="step" data-s="3">
            <div class="num">03</div>
            <div class="icon">🥄</div>
            <div class="label">볶기</div>
            <div class="time">12 MIN</div>
          </div>
          <div class="step" data-s="4">
            <div class="num">04</div>
            <div class="icon">🍽</div>
            <div class="label">담기</div>
            <div class="time">1 MIN</div>
          </div>
        </div>
      </div>

      <!-- Scene 4 — Wordmark outro (11-15s) -->
      <div id="s4" class="clip" data-start="11" data-duration="4" data-track-index="1">
        <div class="outro">
          <div class="mark">Recipe<span class="accent">Cards</span></div>
          <div class="meta">⏱ 30 MIN <span class="herb">·</span> 1인분 <span class="herb">·</span> 떡볶이</div>
          <div class="url">recipecards.kitchen</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;

      // ── Scene 1 — Header reveal (0-3.5s) ──
      tl.fromTo("#s1", { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0);
      tl.fromTo("#header-pill", { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.7, ease: "back.out(1.4)" }, 0.3);
      tl.from("#s1 .stack", { opacity: 0, y: 12, duration: 0.6, ease: "power2.out" }, 0.9);
      // Tomato pill subtle breathe
      tl.to("#header-pill .pill", { scale: 1.04, duration: 0.5, yoyo: true, repeat: 1, ease: "sine.inOut" }, 1.6);
      tl.to("#s1 .stack", { opacity: 0, duration: 0.4 }, 3.0);
      tl.to("#s1", { opacity: 0, duration: 0.3 }, 3.2);
      tl.set("#s1", { opacity: 0 }, 3.5);

      // ── Scene 2 — Ingredients (3.5-7s) ──
      tl.set("#s2", { opacity: 1 }, 3.5);
      tl.fromTo("#footer-mark", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 3.6);
      tl.fromTo("#ing",
        { opacity: 0, y: 40, scale: 0.96 },
        { opacity: 1, y: 0, scale: 1, duration: 0.7, ease: "back.out(1.3)" },
        3.6);
      tl.from("#ing .label", { opacity: 0, y: 8, duration: 0.4, ease: "power2.out" }, 4.0);
      tl.from("#ing .row", { opacity: 0, x: -20, duration: 0.4, stagger: 0.12, ease: "power3.out" }, 4.3);
      tl.to("#s2", { opacity: 0, duration: 0.3, ease: "power2.in" }, 6.7);
      tl.set("#s2", { opacity: 0 }, 7);

      // ── Scene 3 — 4 step icons (7-11s) ──
      tl.set("#s3", { opacity: 1 }, 7);
      tl.from("#steps .step",
        { opacity: 0, y: 40, scale: 0.85, duration: 0.5, stagger: 0.18, ease: "back.out(1.5)" },
        7.1);
      // Icons pulse once
      tl.to("#steps .step .icon",
        { scale: 1.15, duration: 0.4, stagger: 0.15, yoyo: true, repeat: 1, ease: "sine.inOut" },
        8.5);
      tl.to("#s3", { opacity: 0, duration: 0.3, ease: "power2.in" }, 10.7);
      tl.to("#footer-mark", { opacity: 0, duration: 0.4 }, 10.7);
      tl.to("#header-pill", { opacity: 0, duration: 0.4 }, 10.7);
      tl.set("#s3", { opacity: 0 }, 11);
      tl.set("#footer-mark", { opacity: 0 }, 11);

      // ── Scene 4 — Wordmark outro (11-15s) ──
      tl.set("#s4", { opacity: 1 }, 11);
      tl.from("#s4 .mark", { opacity: 0, y: 30, duration: 0.7, ease: "power3.out" }, 11.1);
      tl.from("#s4 .meta", { opacity: 0, duration: 0.5, ease: "power2.out" }, 11.7);
      tl.from("#s4 .url", { opacity: 0, y: 12, duration: 0.5, ease: "power2.out" }, 12.1);
      tl.to("#s4 .url", { opacity: 0.85, duration: 0.6 }, 13.0);
    </script>
  </body>
</html>
