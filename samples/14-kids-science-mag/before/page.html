<body>
  <article class="page">
    <div class="issue">WONDER LAB KIDS · 15호</div>
    <h2>비눗방울은 왜 동그래?</h2>

    <div class="bubble">
      <strong>호기심.</strong> 비눗방울은 왜 동그란 모양일까? 비눗방울은 같은 양의 공기를 담는 모든 모양 중에서 표면적이 가장 작아.
    </div>

    <ol>
      <li>그릇에 따뜻한 물과 주방세제 한 방울을 섞어.</li>
      <li>빨대로 거품을 한 번 불어 봐.</li>
      <li>방울이 둥글게 되는 순간을 관찰해.</li>
    </ol>

    <div class="glossary">
      <span class="chip">표면장력</span> 액체 표면이 자체 면적을 최소화하려는 응집력의 결과로 발생하는 단위 길이 당 힘 (N/m).
    </div>
  </article>
