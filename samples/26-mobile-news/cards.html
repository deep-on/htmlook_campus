<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Mobile cards — Apex IDE</title>
<style>
  body { font-family: 'Apple SD Gothic Neo', -apple-system, sans-serif; margin: 0; min-height: 100vh; background: #0f172a; padding: 2rem; display: grid; grid-template-columns: repeat(auto-fit, 280px); gap: 1.4rem; justify-content: center; align-content: center; }
  .card { width: 280px; aspect-ratio: 9/16; background: white; border-radius: 18px; padding: 1.3rem 1.1rem; display: flex; flex-direction: column; gap: 0.7rem; box-shadow: 0 18px 40px rgba(0,0,0,0.35); }
  .badge { font-size: 0.65rem; letter-spacing: 0.2em; color: #4f46e5; font-weight: 700; }
  h3 { font-size: 1.2rem; margin: 0; line-height: 1.3; color: #0f172a; }
  .body { font-size: 0.88rem; line-height: 1.5; color: #334155; }
  .quote { font-style: italic; font-size: 1.05rem; line-height: 1.4; color: #1f2937; border-left: 3px solid #4f46e5; padding-left: 0.7rem; }
  ul { margin: 0; padding-left: 1.1rem; font-size: 0.85rem; line-height: 1.5; color: #334155; }
  ul li { margin: 0.2rem 0; }
  .src { font-size: 0.75rem; color: #6b7280; margin-top: auto; }
  .src a { color: #4f46e5; text-decoration: none; }
</style>
</head>
<body>
  <article class="card">
    <div class="badge">CARD 1 · TLDR</div>
    <h3>(헤드라인 들어갈 자리)</h3>
    <p class="body">(3 줄 요약 들어갈 자리.)</p>
  </article>

  <article class="card">
    <div class="badge">CARD 2 · 핵심 데이터</div>
    <h3>숫자 4 개</h3>
    <ul>
      <li>(데이터 1)</li>
      <li>(데이터 2)</li>
      <li>(데이터 3)</li>
      <li>(데이터 4)</li>
    </ul>
  </article>

  <article class="card">
    <div class="badge">CARD 3 · 헤드라인 인용</div>
    <p class="quote">(인용 들어갈 자리)</p>
    <p class="body">(— 누가, 어디서)</p>
  </article>

  <article class="card">
    <div class="badge">CARD 4 · 출처 + 링크</div>
    <ul>
      <li>(출처 1)</li>
      <li>(출처 2)</li>
      <li>(출처 3)</li>
    </ul>
    <p class="src"><a href="#">기사 전문 →</a></p>
  </article>
</body>
</html>
