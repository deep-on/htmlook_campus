<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>떡볶이 — 1인분 카드</title>
<style>
  body { font-family: 'Apple SD Gothic Neo', -apple-system, sans-serif; margin: 0; min-height: 100vh; background: #7f1d1d; display: grid; place-items: center; }
  .card { width: 360px; aspect-ratio: 9/16; background: white; border-radius: 22px; padding: 1.6rem 1.4rem; display: flex; flex-direction: column; gap: 0.85rem; box-shadow: 0 30px 70px rgba(0,0,0,0.4); }
  .badge { font-size: 0.7rem; letter-spacing: 0.18em; color: #b91c1c; }
  h2 { font-size: 1.5rem; margin: 0; line-height: 1.2; }
  .meta { font-size: 0.8rem; color: #6b7280; }
  .ingredients { background: #fef2f2; border-radius: 12px; padding: 0.7rem 0.9rem; font-size: 0.8rem; line-height: 1.5; color: #7f1d1d; }
  .steps { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
  .step { background: #fee2e2; border-radius: 10px; padding: 0.55rem; font-size: 0.78rem; line-height: 1.35; color: #7f1d1d; display: flex; flex-direction: column; gap: 0.2rem; }
  .step-num { font-weight: 700; color: #b91c1c; font-size: 0.75rem; }
  .icon { font-size: 1.1rem; }
</style>
</head>
<body>
  <article class="card">
    <div class="badge">RECIPE · 1인분</div>
    <h2>떡볶이 30분</h2>
    <p class="meta">매콤 · 든든 · 1 portion · 320 kcal 추정</p>

    <div class="ingredients">
      <strong>재료:</strong>
      떡 200g · 어묵 60g · 양배추 50g · 대파 30g · 육수 350ml ·
      고추장 25g · 고춧가루 1ts · 간장 0.5T · 설탕 1T · 마늘 0.5T
    </div>

    <div class="steps">
      <div class="step"><span class="step-num">1</span><span class="icon">🍲</span>육수에 양념 풀기</div>
      <div class="step"><span class="step-num">2</span><span class="icon">🔪</span>어묵·채소 한 입 크기</div>
      <div class="step"><span class="step-num">3</span><span class="icon">⏱️</span>떡·어묵·양배추 5-7분 끓이고 맛이 떡 가운데까지 들어가게 충분히 익힌 다음 대파 30초</div>
      <div class="step"><span class="step-num">4</span><span class="icon">🥢</span>그릇에 담고 통깨</div>
    </div>
  </article>
</body>
</html>
